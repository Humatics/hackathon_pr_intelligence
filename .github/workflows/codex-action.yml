name: Codex Second Opinion

on:
  workflow_run:
    workflows: ["Claude Code Review"]
    types: [completed]

concurrency:
  group: codex-review-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  collect_context:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      pr_number: ${{ steps.pr_context.outputs.pr_number }}
      pr_title: ${{ steps.pr_context.outputs.pr_title }}
      pr_body: ${{ steps.pr_context.outputs.pr_body }}
      base_ref: ${{ steps.pr_context.outputs.base_ref }}
      base_sha: ${{ steps.pr_context.outputs.base_sha }}
      head_sha: ${{ steps.pr_context.outputs.head_sha }}
      claude_feedback: ${{ steps.claude_feedback.outputs.feedback }}
    steps:
      - name: Resolve pull request context
        id: pr_context
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const pr = context.payload.workflow_run.pull_requests?.[0];
            if (!pr) {
              core.setFailed("No pull request is associated with this Claude review run.");
              return;
            }

            const { data: fullPr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
            });

            core.setOutput("pr_number", String(fullPr.number));
            core.setOutput("pr_title", fullPr.title || "");
            core.setOutput("pr_body", fullPr.body || "");
            core.setOutput("base_ref", fullPr.base.ref);
            core.setOutput("base_sha", fullPr.base.sha);
            core.setOutput("head_sha", fullPr.head.sha);

      - name: Gather Claude review feedback
        id: claude_feedback
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ steps.pr_context.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const startedAt = new Date(
              context.payload.workflow_run.run_started_at || context.payload.workflow_run.created_at
            );

            const isLikelyClaudeFeedback = (item, timestamp) => {
              const body = item.body || item.body_text || "";
              const login = item.user?.login || "";
              const createdAt = new Date(timestamp);
              return (
                createdAt >= startedAt &&
                (login === "github-actions[bot]" || /claude/i.test(body))
              );
            };

            const issueComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const reviewComments = await github.paginate(github.rest.pulls.listReviewComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const sections = [];

            for (const review of reviews) {
              const timestamp = review.submitted_at || review.created_at;
              if (!timestamp || !isLikelyClaudeFeedback(review, timestamp)) continue;
              sections.push(
                [
                  `Review by ${review.user?.login || "unknown"} (${review.state || "COMMENTED"})`,
                  review.body || "(empty review body)",
                ].join("\n")
              );
            }

            for (const comment of issueComments) {
              if (!isLikelyClaudeFeedback(comment, comment.created_at)) continue;
              sections.push(
                [
                  `Issue comment by ${comment.user?.login || "unknown"}`,
                  comment.body || "(empty comment body)",
                ].join("\n")
              );
            }

            for (const comment of reviewComments) {
              if (!isLikelyClaudeFeedback(comment, comment.created_at)) continue;
              sections.push(
                [
                  `Inline review comment by ${comment.user?.login || "unknown"} on ${comment.path}:${comment.line || comment.original_line || "?"}`,
                  comment.body || "(empty inline comment body)",
                ].join("\n")
              );
            }

            const uniqueSections = [...new Set(sections)];
            const feedback = uniqueSections.length
              ? uniqueSections.join("\n\n---\n\n").slice(0, 20000)
              : "No Claude-authored review comments were found for this workflow run.";

            core.setOutput("feedback", feedback);

  codex:
    needs: collect_context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ needs.collect_context.outputs.pr_number }}/merge
          fetch-depth: 1

      - name: Pre-fetch base and head refs for the PR
        env:
          PR_BASE_REF: ${{ needs.collect_context.outputs.base_ref }}
          PR_NUMBER: ${{ needs.collect_context.outputs.pr_number }}
        run: |
          # Ensure both sides of the PR are available locally for git diff/log commands.
          git fetch --no-tags origin \
            "$PR_BASE_REF:refs/remotes/origin/$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head:refs/remotes/pull/$PR_NUMBER/head"

        # If you want Codex to build and run code, install any dependencies that
        # need to be downloaded before the "Run Codex" step because Codex's
        # default sandbox disables network access.

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: |
            This is PR #${{ needs.collect_context.outputs.pr_number }} for ${{ github.repository }}.

            Review ONLY the changes introduced by the PR.
            Use git history and diffs for this exact range:
            - git log --oneline ${{ needs.collect_context.outputs.base_sha }}...${{ needs.collect_context.outputs.head_sha }}
            - git diff --stat ${{ needs.collect_context.outputs.base_sha }}...${{ needs.collect_context.outputs.head_sha }}
            - git diff ${{ needs.collect_context.outputs.base_sha }}...${{ needs.collect_context.outputs.head_sha }}

            Claude has already reviewed this PR. Your job is to be the second opinion, not a duplicate.
            Compare your findings against Claude's feedback and be explicit about where you agree, where you disagree, and what Claude missed.
            Prioritize disagreements and explain the reasoning behind them.
            Suggest potential bugs, correctness issues, regressions, or missing tests.
            Be concise and specific.

            Format your response with these sections:
            1. Agreement with Claude
            2. Disagreements / lower-confidence Claude claims
            3. Additional risks Codex found
            4. Overall verdict

            Pull request title and body:
            ----
            ${{ needs.collect_context.outputs.pr_title }}

            ${{ needs.collect_context.outputs.pr_body }}

            Claude's feedback from the completed review workflow:
            ----
            ${{ needs.collect_context.outputs.claude_feedback }}

  post_feedback:
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Report Codex feedback
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.workflow_run.pull_requests[0].number,
              body: process.env.CODEX_FINAL_MESSAGE,
            });
